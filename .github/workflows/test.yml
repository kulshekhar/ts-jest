name: Test

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      node-version:
        required: true
        type: string

permissions: # added using https://github.com/step-security/secure-workflows
  contents: read

jobs:
  unit-test:
    permissions:
      checks: write
      contents: read
    name: Unit tests on Node v${{ inputs.node-version }} on ${{ inputs.os }}
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 20
          fetch-tags: false

      - name: Setup workspace ⚙️
        uses: ./.github/actions/setup-workspace
        with:
          os: ${{ inputs.os }}
          node-version: ${{ inputs.node-version }}

      - name: Build 🔧
        run: |
          npm run build
          npm run postbuild

      - name: Run tests 🧪
        run: npm run test
        env:
          CI: true
          DISABLE_MOCKED_WARNING: true

  e2e-test:
    permissions:
      checks: write
      contents: read
    name: E2E tests on Node v${{ inputs.node-version }} on ${{ inputs.os }}
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 20
          fetch-tags: false

      - name: Setup workspace ⚙️
        uses: ./.github/actions/setup-workspace
        with:
          os: ${{ inputs.os }}
          node-version: ${{ inputs.node-version }}

      - name: Build 🔧
        run: |
          npm run build
          npm run postbuild

      - name: Run e2e tests 🧪
        run: |
          npm run test-e2e-cjs
          npm run test-e2e-esm

  example-test:
    permissions:
      checks: write
      contents: read
    name: Example tests on Node v${{ inputs.node-version }} on ${{ inputs.os }}
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 20
          fetch-tags: false

      - name: Setup workspace ⚙️
        uses: ./.github/actions/setup-workspace
        with:
          os: ${{ inputs.os }}
          node-version: ${{ inputs.node-version }}

      - name: Build 🔧
        run: |
          npm run build
          npm run postbuild

      - name: Run tests in example projects 🧪
        run: npm run test-examples
